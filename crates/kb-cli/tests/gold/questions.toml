# Gold question set for kb citation coverage benchmarking.
#
# Each question has:
#   id              — stable identifier for tracking regression over time
#   query           — the exact string passed to `kb ask`
#   expected_sources — titles of wiki pages that SHOULD appear in the retrieval plan
#   notes           — explanation of what this question is testing
#
# Scoring:
#   retrieval_coverage = |expected_sources ∩ retrieved_titles| / |expected_sources|
#   A score of 1.0 means every expected source was retrieved.
#   A score of 0.0 means none were.
#
# The harness matches expected_sources by checking whether any candidate title
# contains the expected string (case-insensitive substring match).

